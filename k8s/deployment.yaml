apiVersion: apps/v1
kind: Deployment
metadata:
  name: downdoor
  labels:
    app: downdoor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: downdoor
  template:
    metadata:
      labels:
        app: downdoor
    spec:
      containers:
        - name: downdoor
          image: downdoor:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: downdoor-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: downdoor
spec:
  type: ClusterIP
  selector:
    app: downdoor
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: downdoor
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - downdoor.example.com
      secretName: downdoor-tls
  rules:
    - host: downdoor.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: downdoor
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: downdoor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: downdoor
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
